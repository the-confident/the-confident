  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ace-between;\n    min-height: 220px;\n  }\n  .tm-card .quote { font-family: var(--font-display); font-weight: 400; font-size: var(--font-size-large); line-height: 1.3; letter-spacing: -0.005em; }\n  .tm-card .quote::before { content: \"\\201C\"; font-style: italic; color: var(--color-accent); margin-right: 2px; background: linear-gradient(var(--color-brand), var(--color-brand)); }\n  .tm-card .quote::after { content: \"\\201D\"; font-style: italic; color: var(--color-accent); background: linear-gradient(var(--color-brand), var(--color-brand)); }\n  .tm-card .who { font-size: var(--font-size-small-plus); color: var(--color-fg-muted); display: flex; align-items: center; gap: var(--spacing-smaller); }\n  .tm-card .who .dash { color: var(--color-accent); background: linear-gradient(var(--color-brand), var(--color-brand)); }\n\n  /* Numbers */\n  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--color-rule); border-top: 1px solid var(--color-rule); border-bottom: 1px solid var(--color-rule); }\n  .stats .stat { background: var(--color-brand); padding: var(--spacing-largest) var(--spacing-larger); display: flex; flex-direction: column; gap: var(--spacing-smaller); }\n  .stats .n { font-family: var(--font-display); font-weight: 500; font-size: var(--font-size-mega); line-height: 0.9; letter-spacing: -0.02em; }\n  .stats .n em { font-style: italic; font-weight: 400; color: var(--color-fg); }\n  .stats .l { font-size: var(--font-size-small-plus); color: var(--color-fg-muted); max-width: 28ch; }\n  @media (max-width: 900px) { .stats { grid-template-columns: 1fr 1fr; } }\n  @media (max-width: 500px) { .stats { grid-template-columns: 1fr; } }\n\n  /* Contact */\n  .contact { padding: var(--spacing-max) 0 var(--spacing-ultra); }\n  .contact .grid { display: grid; grid-template-columns: 1.1fr 1fr; gap: var(--spacing-ultra); align-items: start; }\n  .contact h2 { font-family: var(--font-display); font-weight: 500; font-size: var(--font-size y: var(--font-mono); font-size: var(--font-size-smaller); letter-spacing: 0.12em; text-transform: uppercase; color: var(--color-fg); margin-bottom: var(--spacing-small); }\n  footer ul { list-style: none; display: flex; flex-direction: column; gap: var(--spacing-smaller); }\n  footer ul a:hover { opacity: 0.65; }\n  footer .bottom { margin-top: var(--spacing-largest); padding-top: var(--spacing-large); border-top: 1px solid var(--color-rule); display: flex; justify-content: space-between; }\n  @media (max-width: 900px) { footer .fg { grid-template-columns: 1fr 1fr; } }\n\n  /* Hero variant 2 — centered */\n  [data-hero=\"centered\"] .hero h1 { text-align: center; max-width: 1200px; margin: 0 auto; }\n  [data-hero=\"centered\"] .hero .sub-grid { grid-template-columns: 1fr; text-align: center; }\n  [data-hero=\"centered\"] .hero .lede { margin: 0 auto; grid-column: 1; }\n  [data-hero=\"centered\"] .hero .cta-col { align-items: center; }\n\n  /* Hero variant 3 — stacked */\n  [data-hero=\"stacked\"] .hero h1 { font-size: calc(var(--font-size-hero) * 1.2); padding: var(--spacing-large) 0 var(--spacing-medium); }\n\n  /* Tweaks panel */\n  .tweaks-panel {\n    position: fixed; right: 24px; bottom: 24px; z-index: 100;\n    background: #fff; color: var(--color-brand-ink);\n    border: 1px solid rgba(12,37,64,0.25);\n    border-radius: 6px;\n    width: 288px;\n    font-family: var(--font-body);\n    box-shadow: 0 20px 60px rgba(0,0,0,0.25);\n    display: none;\n  }\n  .tweaks-panel.visible { display: block; }\n  .tweaks-panel header { padding: 14px 18px; border-bottom: 1px solid rgba(12,37,64,0.12); display: flex; align-items: center; justify-content: space-between; }\n  .tweaks-panel header .t { font-family: var(--font-display); font-weight: 600; font-size: var(--font-size-medium); }\n  .tweaks-panel header .t em { font-style: italic; font-weight: 400; color: var(--color-accent); }\n  .tweaks-panel .body { padding: 16px 18px; display: flex; flex-direction: column; gap: var(--spacing-medium); }\n  .tweaks-panel .field label { font-size: var(--font-size-smaller); font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(12,37,64,0.65); }\n  .tweaks-panel .seg {\n    margin-top: var(--spacing-smaller);\n    display: grid; grid-auto-flow: column; grid-auto-columns: 1fr;\n    border: 1px solid rgba(12,37,64,0.2); border-radius: 4px; overflow: hidden;\n  }\n  .tweaks-panel .seg button {\n    padding: 8px 4px; font-size: var(--font-size-smaller); font-weight: 500; border-right: 1px solid rgba(12,37,64,0.12);\n    background: transparent; color: var(--color-brand-ink);\n  }\n  .tweaks-panel .seg button:last-child { border-right: none; }\n  .tweaks-panel .seg button.on { background: var(--color-brand-ink); color: #fff; }\n\n  /* Accent intensity variants */\n  [data-accent=\"subtle\"] { }\n  [data-accent=\"subtle\"] .hero h1 em { color: var(--color-fg); }\n  [data-accent=\"subtle\"] .section-head .title .accent { color: var(--color-fg); font-style: italic; font-weight: 400; }\n  [data-accent=\"bold\"] .btn-primary { letter-spacing: 0.08em; text-transform: uppercase; padding: 18px 28px; }\n  [data-accent=\"bold\"] .hero h1 em { background: var(--color-accent); color: #fff; padding: 0 12px; font-style: italic; }\n\n  /* Inline helpers */\n  .sep { display: inline-block; width: 28px; height: 1px; background: currentColor; opacity: 0.4; vertical-align: middle; margin: 0 var(--spacing-smaller); }\n  .accent, .logo .dot, .contact .email-card .addr .dot {\n    color: var(--color-accent);\n    background: linear-gradient(var(--color-brand), var(--color-brand));\n  }\n\n  .caret { color: var(--color-fg); font-style: italic; font-family: var(--font-display); }\n<\u002Fstyle>\n\n<\u002Fhead>\n<body data-theme=\"navy\" data-hero=\"editorial\" data-accent=\"sharp\">\n\n<nav class=\"top\">\n  <div class=\"container inner\">\n    <a href=\"#\" class=\"logo\"><span class=\"the\">the<\u002Fspan>Confident<span class=\"dot\">.<\u002Fspan><\u002Fa>\n    <div class=\"links\">\n      <a href=\"#services\" class=\"active\">Services<\u002Fa>\n      <a href=\"#work\">Work<\u002Fa>\n      <a href=\"#build-to-share\">Build to Share<\u002Fa>\n      <a href=\"#about\">About<\u002Fa>\n      <a href=\"#contact\">Contact<\u002Fa>\n    <\u002Fdiv>\n    <a href=\"#contact\" class=\"cta\">Talk to us <span class=\"arr\">→<\u002Fspan><\u002Fa>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<header class=\"hero\" data-screen-label=\"Hero\">\n  <div class=\"container\">\n    <div class=\"meta-row\">\n      <div class=\"meta-left\">\n        <span class=\"mono\">SINCE 2019<\u002Fspan>\n        <span class=\"dot-sep\"><\u002Fspan>\n        <span class=\"mono\">DUBLIN · LONDON<\u002Fspan>\n        <span class=\"dot-sep\"><\u002Fspan>\n        <span class=\"mono\">LOCALGOV DRUPAL · DOS7<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"mono\" style=\"color: var(--color-fg-muted);\">No. 001 / Homepage<\u002Fdiv>\n    <\u002Fdiv>\n\n    <h1>\n      Built by the<br>\n      people who built<br>\n      <em>LocalGov Drupal<span class=\"accent\">.<\u002Fspan><\u002Fem>\n    <\u002Fh1>\n\n    <div class=\"sub-grid\">\n      <p class=\"lede\">\n        The Confident is led by <strong>Mark Conroy<\u002Fstrong> — Frontend Lead of LocalGov Drupal, and the author of the theme system and multilingual modules running on <strong>58+ council websites<\u002Fstrong> across the UK and Ireland. When you work with us, you're working with the person who shapes the platform itself.\n      <\u002Fp>\n      <div class=\"cta-col\">\n        <a href=\"#contact\" class=\"btn-primary\">Talk to us before you write your brief <span class=\"arr\">→<\u002Fspan><\u002Fa>\n        <a href=\"#services\" class=\"btn-ghost\">See how councils work with us <span class=\"arr\">→<\u002Fspan><\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- Ticker -->\n<div class=\"ticker\" aria-hidden=\"true\">\n  <div class=\"ticker-track\" id=\"ticker-track\"><\u002Fdiv>\n  <div class=\"ticker-track\" aria-hidden=\"true\"><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Stats -->\n<section class=\"tight\" style=\"padding-top: var(--spacing-mega); padding-bottom: var(--spacing-mega); border-top: none;\">\n  <div class=\"container\">\n    <div class=\"stats\">\n      <div class=\"stat\">\n        <div class=\"n\">58<em>+<\u002Fem><\u002Fdiv>\n        <div class=\"l\">Council websites running code we wrote<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"stat\">\n        <div class=\"n\"><em>01<\u002Fem><\u002Fdiv>\n        <div class=\"l\">LocalGov Drupal Frontend Lead on your team<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"stat\">\n        <div class=\"n\">DOS<em>7<\u002Fem><\u002Fdiv>\n        <div class=\"l\">Listed on the UK Digital Outcomes framework<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"stat\">\n        <div class=\"n\">£2.5<em>k<\u002Fem><\u002Fdiv>\n        <div class=\"l\">All-inclusive monthly retainer. No hour-counting.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- Services -->\n<section id=\"services\" data-screen-label=\"Services\">\n  <div class=\"container\">\n    <div class=\"section-head\">\n      <div class=\"idx\">\n        § 01\n        <span class=\"label\">Services<\u002Fspan>\n      <\u002Fdiv>\n      <div>\n        <div class=\"title\">Six ways we can <em class=\"accent\">help.<\u002Fem><\u002Fdiv>\n        <p class=\"rail\">Whether you're just starting with LGD, building capability in your team, or want to fund something the whole sector benefits from — there's a route that fits.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Group 1: For your site -->\n    <div class=\"services\">\n      <div class=\"group-label\">For<br>your site<\u002Fdiv>\n      <div class=\"group-items\">\n        <a href=\"#\" class=\"service\">\n          <span class=\"num\">01 / HEALTH CHECK<\u002Fspan>\n          <h3>LGD health check<\u002Fh3>\n          <p>Not sure what your LGD site needs? We review your codebase, theme, accessibility, and content structure — and give you a prioritised report of what to fix and what to build next.<\u002Fp>\n          <span class=\"meta\">Fixed price · Direct award · No procurement required<\u002Fspan>\n          <span class=\"link\">Find out more <span class=\"arr\">→<\u002Fspan><\u002Fspan>\n        <\u002Fa>\n        <a href=\"#\" class=\"service\">\n          <span class=\"num\">02 / DESIGN &amp; BUILD<\u002Fspan>\n          <h3>Site design &amp; build<\u002Fh3>\n          <p>We design and build LocalGov Drupal websites for councils — from discovery through to launch. Currently working with Colchester City Council.<\u002Fp>\n          <span class=\"meta\">Available on DOS7 for compliant procurement<\u002Fspan>\n          <span class=\"link\">Talk to us about your project <span class=\"arr\">→<\u002Fspan><\u002Fspan>\n        <\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Group 1b: retainer on its own row -->\n    <div class=\"services\" style=\"margin-top: 0;\">\n      <div class=\"group-label\" style=\"opacity:0;\">.<\u002Fdiv>\n      <div class=\"group-items\" style=\"border-top: none;\">\n        <a href=\"#\" class=\"service\" style=\"border-top: 1px solid var(--color-rule); padding-top: var(--spacing-larger);\">\n          <span class=\"num\">03 / RETAINER<\u002Fspan>\n          <h3>Ongoing retainer<\u002Fh3>\n          <p>One fixed monthly fee. No hour-counting, no \"that's out of scope\", no routine maintenance eating your budget. Fast, expert support from the people who know LGD better than anyone.<\u002Fp>\n          <span class=\"meta\">£2,500/month · All-inclusive<\u002Fspan>\n          <span class=\"link\">See how our retainer works <span class=\"arr\">→<\u002Fspan><\u002Fspan>\n        <\u002Fa>\n        <div class=\"service\" style=\"border-top: 1px solid var(--color-rule); padding-top: var(--spacing-larger); opacity: 0.4; pointer-events: none;\">\n          <span class=\"num\">—<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Group 2: For your team -->\n    <div class=\"services\" style=\"margin-top: var(--spacing-largest);\">\n      <div class=\"group-label\">For<br>your team<\u002Fdiv>\n      <div class=\"group-items\">\n        <a href=\"#\" class=\"service\">\n          <span class=\"num\">04 / TRAINING<\u002Fspan>\n          <h3>LGD training<\u002Fh3>\n          <p>We train council digital teams to understand and work confidently with LocalGov Drupal — from content editors to in-house developers. Hands-on, practical, and taught by the person who built the platform.<\u002Fp>\n          <span class=\"meta\">Online course launching April 2026<\u002Fspan>\n          <span class=\"link\">See our training options <span class=\"arr\">→<\u002Fspan><\u002Fspan>\n        <\u002Fa>\n        <a href=\"#\" class=\"service\">\n          <span class=\"num\">05 / EMBEDDED<\u002Fspan>\n          <h3>Embedded transformation<\u002Fh3>\n          <p>We work inside your team one or two days a week over several months — building your processes, workflows, and LGD knowledge from the inside. The goal is a team that doesn't need to keep coming back to us.<\u002Fp>\n          <span class=\"meta\">Our most effective service for long-term capability<\u002Fspan>\n          <span class=\"link\">How embedding works <span class=\"arr\">→<\u002Fspan><\u002Fspan>\n        <\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Group 3: For the sector -->\n    <div class=\"services\" style=\"margin-top: var(--spacing-largest);\">\n      <div class=\"group-label\">For<br>the sector<\u002Fdiv>\n      <div class=\"group-items\">\n        <a href=\"#\" class=\"service\" style=\"grid-column: span 2;\">\n          <span class=\"num\">06 / FUND A MODULE<\u002Fspan>\n          <h3 style=\"font-size: var(--font-size-largest); max-width: 18ch;\">Fund a module — and give it to every council for free.<\u002Fh3>\n          <p style=\"max-width: 72ch;\">Have a problem every council shares? Fund the open-source solution. Your council gets exactly what it needs. Every other council gets it too, at no cost to them.<\u002Fp>\n          <span class=\"meta\">Aligns with MHCLG's Local Digital Declaration &amp; Ireland's Build to Share initiative<\u002Fspan>\n          <span class=\"link\">Learn about Fund a Module <span class=\"arr\">→<\u002Fspan><\u002Fspan>\n        <\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- Work -->\n<section id=\"work\" data-screen-label=\"Work\">\n  <div class=\"container\">\n    <div class=\"section-head\">\n      <div class=\"idx\">\n        § 02\n        <span class=\"label\">Recent<br>work<\u002Fspan>\n      <\u002Fdiv>\n      <div>\n        <div class=\"title\">What we've <em>built.<\u002Fem><\u002Fdiv>\n        <p class=\"rail\">Three recent projects for councils across the UK and Ireland — two of them released as free, open-source modules for every other council to use.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"work-list\">\n      <a href=\"#\" class=\"work-row\">\n        <div class=\"num\">№ 001<\u002Fdiv>\n        <div class=\"title-col\">\n          <h4>LocalGov Bus Data<\u002Fh4>\n          <div class=\"client\">Cumberland Council <span class=\"pill\">Build to Share<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <p>Cumberland funded an open-source module that connects council websites directly to the national Bus Open Data Service. The module is now free for every UK council to use — forever.<\u002Fp>\n        <div class=\"go\">Read the story <span class=\"arr\">→<\u002Fspan><\u002Fdiv>\n      <\u002Fa>\n      <a href=\"#\" class=\"work-row\">\n        <div class=\"num\">№ 002<\u002Fdiv>\n        <div class=\"title-col\">\n          <h4>Public Consultations Module<\u002Fh4>\n          <div class=\"client\">Tipperary County Council <span class=\"pill\">Build to Share<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <p>Rather than paying annual licence fees to a proprietary platform, Tipperary funded an open-source consultations tool. Released on Drupal.org, available to any council worldwide at no cost.<\u002Fp>\n        <div class=\"go\">Read the story <span class=\"arr\">→<\u002Fspan><\u002Fdiv>\n      <\u002Fa>\n      <a href=\"#\" class=\"work-row\">\n        <div class=\"num\">№ 003<\u002Fdiv>\n        <div class=\"title-col\">\n          <h4>Design System Re-architecture<\u002Fh4>\n          <div class=\"client\">Royal Borough of Greenwich <span class=\"pill\" style=\"border-color: var(--color-rule-strong); color: var(--color-fg);\">Featured<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <p>A complete rebuild of Greenwich's design system to LocalGov Drupal standards — accessible, consistent, and built to scale across the borough's full digital estate.<\u002Fp>\n        <div class=\"go\">Read the story <span class=\"arr\">→<\u002Fspan><\u002Fdiv>\n      <\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- Manifesto: Build to Share -->\n<section id=\"build-to-share\" class=\"manifesto\" data-screen-label=\"Build to Share\">\n  <div class=\"container\">\n    <div class=\"section-head\" style=\"margin-bottom: var(--spacing-mega);\">\n      <div class=\"idx\">§ 03<span class=\"label\">Our model<\u002Fspan><\u002Fdiv>\n      <div>\n        <div class=\"title\">Build once. Share with <em class=\"accent\">everyone.<\u002Fem><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"manifesto-grid\">\n      <div>\n        <div class=\"big\">\n          Most agencies build something for your council and move on.<br><br>\n          <em>We build something for your council — and then give it to every council, <span class=\"accent\">for free.<\u002Fspan><\u002Fem>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"body\">\n        <p>This is the Build to Share model, and it changes the economics of council digital services entirely. One council funds the development. The module is released open-source on Drupal.org. Every council in the UK, Ireland, and beyond can use it at no cost, forever.<\u002Fp>\n        <p>Your council gets a solution built precisely to your requirements. You get the credit for funding shared public digital infrastructure. And you benefit from every improvement the community makes to it after release.<\u002Fp>\n        <div class=\"callout\">\n          \"Public funds become public code. That's how it should work.\"\n        <\u002Fdiv>\n        <p class=\"meta\">Aligns with MHCLG's Local Digital Declaration and the Irish Government's Build to Share initiative.<\u002Fp>\n        <a href=\"#\" class=\"btn-ghost\" style=\"align-self: flex-start;\">See how Fund a Module works <span class=\"arr\">→<\u002Fspan><\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- Small by choice -->\n<section id=\"about\" data-screen-label=\"About\">\n  <div class=\"container\">\n    <div class=\"section-head\">\n      <div class=\"idx\">§ 04<span class=\"label\">How we work<\u002Fspan><\u002Fdiv>\n      <div>\n        <div class=\"title\">Small <em>by choice.<\u002Fem><br>Not by <em class=\"accent\">accident.<\u002Fem><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"small-grid\">\n      <div>\n        <div class=\"lead\">\n          When you email us, <em>the person who replies<\u002Fem> is the person doing the work.\n        <\u002Fdiv>\n        <blockquote>\n          You've done an amazing job this week (and every week). Thanks Mark!\n          <cite>— Will Callaghan · Product Lead, LocalGov Drupal<\u002Fcite>\n        <\u002Fblockquote>\n      <\u002Fdiv>\n      <div class=\"notes\">\n        <p>We deliberately keep The Confident small. Fewer clients means every client gets our full attention — not a junior account manager and a ticket queue.<\u002Fp>\n        <p>When something goes wrong, we already know about it. When you need a sensible answer on a Friday afternoon, you get one.<\u002Fp>\n        <p>We are selective about what we take on. If a project isn't one we can genuinely excel at, we'll tell you — and point you in the direction of someone who can. We'd rather turn down work than do it badly.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- Testimonials -->\n<section class=\"tm-section\" data-screen-label=\"Testimonials\">\n  <div class=\"container\">\n    <div class=\"tm-head\">\n      <div class=\"overline\" style=\"color: var(--color-fg-muted); margin-bottom: var(--spacing-medium);\">§ 05 · What councils say<\u002Fdiv>\n      <div class=\"title\">Trusted by councils across the<br><em>UK &amp; Ireland.<\u002Fem><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"tm-rail\">\n    <div class=\"track\" id=\"tm-track-1\"><\u002Fdiv>\n    <div class=\"track\" aria-hidden=\"true\"><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"tm-rail rev\" style=\"margin-top: var(--spacing-medium);\">\n    <div class=\"track\" id=\"tm-track-2\"><\u002Fdiv>\n    <div class=\"track\" aria-hidden=\"true\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- Contact -->\n<section id=\"contact\" class=\"contact\" data-screen-label=\"Contact\">\n  <div class=\"container\">\n    <div class=\"grid\">\n      <div>\n        <div class=\"overline\" style=\"color: var(--color-fg-muted); margin-bottom: var(--spacing-large);\">§ 06 · Let's talk<\u002Fdiv>\n        <h2>Talk to us <em>before<\u002Fem> you write your brief<span class=\"accent\">.<\u002Fspan><\u002Fh2>\n        <p>Whether you're planning a new LGD build, looking for ongoing support, training your team, or want to fund something the whole sector can benefit from — we'd love to hear from you. We're happy to have an informal conversation before you've started a procurement process. In fact, that's usually the most useful time to talk.<\u002Fp>\n        <div class=\"actions\">\n          <a href=\"#\" class=\"btn-primary\">Book a conversation <span class=\"arr\">→<\u002Fspan><\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <a href=\"mailto:info@the-confident.com\" class=\"email-card\">\n          <div class=\"lbl\">Email us directly<\u002Fdiv>\n          <div class=\"addr\">info@the-confident<span class=\"dot\">.<\u002Fspan>com<\u002Fdiv>\n        <\u002Fa>\n        <div class=\"check\" style=\"margin-top: var(--spacing-large);\">\n          <div class=\"row\"><span class=\"tick\">✓<\u002Fspan> Listed on DOS7<\u002Fdiv>\n          <div class=\"row\"><span class=\"tick\">✓<\u002Fspan> Registered in Ireland and the UK<\u002Fdiv>\n          <div class=\"row\"><span class=\"tick\">✓<\u002Fspan> Happy to support pre-market engagement conversations<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- Footer -->\n<footer>\n  <div class=\"container\">\n    <div class=\"fg\">\n      <div>\n        <a href=\"#\" class=\"logo\" style=\"font-size: var(--font-size-large);\"><span class=\"the\">the<\u002Fspan>Confident<span class=\"dot\">.<\u002Fspan><\u002Fa>\n        <p style=\"margin-top: var(--spacing-medium); max-width: 36ch;\">LocalGov Drupal for UK &amp; Irish councils. Built by the people who built the platform.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <h5>Services<\u002Fh5>\n        <ul>\n          <li><a href=\"#\">Health check<\u002Fa><\u002Fli>\n          <li><a href=\"#\">Design &amp; build<\u002Fa><\u002Fli>\n          <li><a href=\"#\">Retainer<\u002Fa><\u002Fli>\n          <li><a href=\"#\">Training<\u002Fa><\u002Fli>\n          <li><a href=\"#\">Embedded<\u002Fa><\u002Fli>\n          <li><a href=\"#\">Fund a Module<\u002Fa><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div>\n        <h5>Company<\u002Fh5>\n        <ul>\n          <li><a href=\"#\">Work<\u002Fa><\u002Fli>\n          <li><a href=\"#\">Build to Share<\u002Fa><\u002Fli>\n          <li><a href=\"#\">About Mark<\u002Fa><\u002Fli>\n          <li><a href=\"#\">Writing<\u002Fa><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div>\n        <h5>Contact<\u002Fh5>\n        <ul>\n          <li><a href=\"mailto:info@the-confident.com\">info@the-confident.com<\u002Fa><\u002Fli>\n          <li>Dublin, Ireland<\u002Fli>\n          <li>London, UK<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"bottom\">\n      <span>© 2019–2026 The Confident Ltd. · Registered in Ireland and the UK.<\u002Fspan>\n      <span class=\"mono\">DOS7 · LOCALGOV DRUPAL<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<!-- Tweaks panel -->\n<div class=\"tweaks-panel\" id=\"tweaks\">\n  <header>\n    <div class=\"t\">Tweak<em>s.<\u002Fem><\u002Fdiv>\n    <button id=\"close-tweaks\" style=\"font-size:18px; opacity:0.5;\">×<\u002Fbutton>\n  <\u002Fheader>\n  <div class=\"body\">\n    <div class=\"field\">\n      <label>Theme<\u002Flabel>\n      <div class=\"seg\" data-key=\"theme\">\n        <button data-val=\"navy\">Navy<\u002Fbutton>\n        <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"field\">\n      <label>Hero layout<\u002Flabel>\n      <div class=\"seg\" data-key=\"heroVariant\">\n        <button data-val=\"editorial\">Editorial<\u002Fbutton>\n        <button data-val=\"centered\">Centered<\u002Fbutton>\n        <button data-val=\"stacked\">XXL<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"field\">\n      <label>Accent intensity<\u002Flabel>\n      <div class=\"seg\" data-key=\"accentIntensity\">\n        <button data-val=\"subtle\">Subtle<\u002Fbutton>\n        <button data-val=\"sharp\">Sharp<\u002Fbutton>\n        <button data-val=\"bold\">Bold<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n  // --- ticker content\n  const TICKER = [\n    \"LocalGov Drupal\", \"Design Systems\", \"Accessibility WCAG 2.2 AA\", \"Theme engineering\",\n    \"Multilingual modules\", \"Open source\", \"Build to Share\", \"Direct award eligible\",\n    \"DOS7\", \"Retainer care\", \"Training\", \"Embedded transformation\", \"Drupal core contributor\"\n  ];\n  function fillTicker(el) {\n    el.innerHTML = TICKER.map(t => `<span>${t}<\u002Fspan><span class=\"star\">✦<\u002Fspan>`).join(\"\");\n  }\n  document.querySelectorAll(\"#ticker-track, .ticker-track\").forEach(fillTicker);\n\n  // --- testimonials\n  const TMS_A = [\n    {q:\"Thanks very much for all your work, you massive LGD legend.\", w:\"Nicholas Ward\", r:\"Essex County Council\"},\n    {q:\"If you are looking for someone with a huge knowledge of Drupal and LocalGov Drupal, look no further.\", w:\"Tim O'Driscoll\", r:\"Digital Lead, Tipperary County Council\"},\n    {q:\"We learned way more than we ever expected. Brilliant training.\", w:\"Joe Swarbrick\", r:\"Blackburn with Darwen Council\"},\n    {q:\"Your work is exceptional and your contribution to LocalGov Drupal has been immense.\", w:\"Colin Stenning\", r:\"MHCLG Digital Health Check\"},\n  ];\n  const TMS_B = [\n    {q:\"Amazing work. If you need a design system re-architected, go talk to The Confident.\", w:\"Alex Sturtivant\", r:\"Royal Borough of Greenwich\"},\n    {q:\"You've done an amazing job this week (and every week). Thanks Mark!\", w:\"Will Callaghan\", r:\"Product Lead, LocalGov Drupal\"},\n    {q:\"Exactly the kind of partner councils need — pragmatic, generous, and deeply technical.\", w:\"Digital Lead\", r:\"UK County Council\"},\n    {q:\"Felt like having the source of truth in the room with us. Invaluable.\", w:\"Head of Web\", r:\"Unitary Authority, UK\"},\n  ];\n  function renderTms(el, items) {\n    el.innerHTML = items.concat(items).map(t => `\n      <div class=\"tm-card\">\n        <div class=\"quote\">${t.q}<\u002Fdiv>\n        <div class=\"who\"><span class=\"dash\">—<\u002Fspan>${t.w} · <span style=\"opacity:0.8\">${t.r}<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    `).join(\"\");\n  }\n  const t1 = document.getElementById(\"tm-track-1\");\n  const t2 = document.getElementById(\"tm-track-2\");\n  renderTms(t1, TMS_A); renderTms(t1.nextElementSibling, TMS_A);\n  renderTms(t2, TMS_B); renderTms(t2.nextElementSibling, TMS_B);\n\n  // --- Tweaks protocol\n  const body = document.body;\n  const state = { ...TWEAK_DEFAULTS };\n  function applyState() {\n    body.dataset.theme = state.theme;\n    body.dataset.hero = state.heroVariant;\n    body.dataset.accent = state.accentIntensity;\n    document.querySelectorAll(\".tweaks-panel .seg\").forEach(seg => {\n      const key = seg.dataset.key;\n      seg.querySelectorAll(\"button\").forEach(b => {\n        b.classList.toggle(\"on\", b.dataset.val === state[key]);\n      });\n    });\n  }\n  applyState();\n\n  document.querySelectorAll(\".tweaks-panel .seg button\").forEach(btn => {\n    btn.addEventListener(\"click\", () => {\n      const key = btn.parentElement.dataset.key;\n      state[key] = btn.dataset.val;\n      applyState();\n      window.parent.postMessage({type:\"__edit_mode_set_keys\", edits:{[key]: btn.dataset.val}}, \"*\");\n    });\n  });\n\n  document.getElementById(\"close-tweaks\").addEventListener(\"click\", () => {\n    document.getElementById(\"tweaks\").classList.remove(\"visible\");\n    window.parent.postMessage({type:\"__edit_mode_deactivated\"}, \"*\");\n  });\n\n  window.addEventListener(\"message\", e => {\n    const m = e.data;\n    if (!m || !m.type) return;\n    if (m.type === \"__activate_edit_mode\") document.getElementById(\"tweaks\").classList.add(\"visible\");\n    if (m.type === \"__deactivate_edit_mode\") document.getElementById(\"tweaks\").classList.remove(\"visible\");\n  });\n\n  // announce availability AFTER listener is live\n  window.parent.postMessage({type:\"__edit_mode_available\"}, \"*\");\n\n  // --- nav active state on scroll\n  const sections = document.querySelectorAll(\"section[id]\");\n  const links = document.querySelectorAll(\"nav.top .links a\");\n  const obs = new IntersectionObserver((entries) => {\n    entries.forEach(en => {\n      if (en.isIntersecting) {\n        const id = en.target.id;\n        links.forEach(l => l.classList.toggle(\"active\", l.getAttribute(\"href\") === \"#\" + id));\n      }\n    });\n  }, { rootMargin: \"-40% 0px -55% 0px\" });\n  sections.forEach(s => obs.observe(s));\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
